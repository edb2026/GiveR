<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GivyRewardsShop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0A0A0A; font-family: Arial; color: white; padding: 20px; }
    h1 { text-align: center; margin-bottom: 30px; color: #C5A267; }
    .product { background: #1A1A1A; padding: 20px; margin: 15px 0; border-radius: 15px; }
    .product h3 { color: #C5A267; margin-bottom: 10px; }
    .price { font-size: 22px; color: #C5A267; font-weight: bold; margin: 10px 0; }
    button { background: #1877F2; color: white; padding: 12px 20px; border: none; border-radius: 25px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 10px; }
    .admin-link { position: fixed; bottom: 20px; left: 20px; width: 40px; height: 40px; background: #C5A267; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0.3; cursor: pointer; }
    .admin-link:hover { opacity: 1; }
    .empty { text-align: center; padding: 50px; color: #888; }
  </style>
</head>
<body>
  <h1>🛋️ GivyRewardsShop</h1>
  <div id="products" class="empty">Loading...</div>
  <div class="admin-link" onclick="goToAdmin()">👑</div>

  <script>
    let products = [];
    
    function loadProducts() {
      try {
        const saved = localStorage.getItem('givy_products');
        if(saved && saved !== 'undefined') {
          products = JSON.parse(saved);
        } else {
          products = [
            { id: 1, name: "Marquess Sofa", description: "Luxury velvet sofa", price: 4890, category: "seating" },
            { id: 2, name: "Eclipse Table", description: "Modern dining table", price: 6750, category: "furniture" },
            { id: 3, name: "Cocoon Chair", description: "Comfort armchair", price: 2950, category: "seating" }
          ];
          localStorage.setItem('givy_products', JSON.stringify(products));
        }
      } catch(e) { console.log(e); }
      
      renderProducts();
    }
    
    function renderProducts() {
      const container = document.getElementById('products');
      if(!products.length) {
        container.innerHTML = '<div class="empty">✨ No products yet.<br>Tap the crown icon to add.</div>';
        return;
      }
      
      container.innerHTML = products.map(p => `
        <div class="product">
          <h3>${p.name}</h3>
          <p>${p.description || 'Premium quality furniture'}</p>
          <div class="price">$${p.price.toLocaleString()}</div>
          <button onclick="buyProduct('${p.name}', ${p.price})">📱 Buy on Facebook Marketplace</button>
        </div>
      `).join('');
    }
    
    function buyProduct(name, price) {
      alert(`🔹 Contact seller on Facebook 🔹\n\nProduct: ${name}\nPrice: $${price}\n\nMessage: Hi! I'm interested in this ${name}. Is it still available?\n\nNote: Replace 'your_fb_username' in code with your actual Facebook username.`);
      // window.open('https://m.me/your_fb_username', '_blank');
    }
    
    function goToAdmin() {
      window.location.href = 'admin.html';
    }
    
    window.addEventListener('storage', function(e) {
      if(e.key === 'givy_products') {
        loadProducts();
      }
    });
    
    loadProducts();
  </script>
</body>
</html>
