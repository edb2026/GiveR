<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GivyRewardsAdmin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0A0A0A; font-family: Arial; color: white; padding: 20px; }
    h1, h2 { color: #C5A267; margin-bottom: 20px; }
    input, textarea, select { width: 100%; padding: 12px; margin: 8px 0 20px 0; background: #1E1E1E; border: 1px solid #333; border-radius: 10px; color: white; font-size: 16px; }
    button { background: #C5A267; color: black; padding: 14px; border: none; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 5px 0; width: 100%; }
    .exit-btn { background: #333; color: white; margin-top: 20px; }
    .product-item { background: #1A1A1A; padding: 15px; margin: 10px 0; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .product-info { flex: 1; }
    .delete-btn { background: #aa2e2e; color: white; padding: 8px 20px; width: auto; margin: 5px; }
    .login-box { background: #1A1A1A; padding: 30px; border-radius: 20px; max-width: 350px; margin: 100px auto; text-align: center; }
    .login-box input { margin-bottom: 20px; }
    .count { background: #C5A267; color: black; padding: 5px 12px; border-radius: 20px; font-size: 14px; margin-left: 10px; }
    .add-more { background: #2a5f8a; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="loginSection" style="display: none;">
    <div class="login-box">
      <h2>🔐 Admin Access</h2>
      <input type="password" id="password" placeholder="Enter password">
      <button onclick="login()">Login</button>
    </div>
  </div>
  
  <div id="adminSection" style="display: none;">
    <h1>👑 GivyRewardsAdmin</h1>
    
    <div id="formArea">
      <h2 id="formTitle">➕ Add New Product</h2>
      <input type="text" id="name" placeholder="Product Name (e.g. Velvet Sofa)">
      <input type="text" id="brand" placeholder="Brand (e.g. GIVY STUDIO)" value="GIVY STUDIO">
      <select id="category">
        <option value="furniture">Furniture</option>
        <option value="seating">Seating</option>
        <option value="beds">Beds</option>
        <option value="decor">Decor</option>
        <option value="office">Office</option>
      </select>
      <textarea id="desc" rows="3" placeholder="Description (luxurious details...)"></textarea>
      <input type="number" id="price" placeholder="Price in USD">
      <input type="hidden" id="editId">
      <button id="saveBtn" onclick="saveProduct()">💾 Save Product</button>
      <button id="addMoreBtn" class="add-more" onclick="resetAndAddMore()">➕ Add More</button>
      <button id="cancelBtn" style="display:none;" onclick="cancelEdit()">❌ Cancel Edit</button>
    </div>
    
    <hr style="margin: 30px 0; border-color: #333;">
    
    <h2>📦 Current Collection <span id="count" class="count">0</span></h2>
    <div id="productList"></div>
    
    <button onclick="syncFacebook()">📘 Sync All to Facebook Marketplace</button>
    <button class="exit-btn" onclick="exitToShop()">🚪 Exit to Shop</button>
  </div>

  <script>
    const CORRECT_PASSWORD = "admin123";
    let products = [];
    
    function checkLogin() {
      const loggedIn = localStorage.getItem('admin_logged_in');
      if(loggedIn === 'true') {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('adminSection').style.display = 'block';
        loadProducts();
      } else {
        document.getElementById('loginSection').style.display = 'block';
        document.getElementById('adminSection').style.display = 'none';
      }
    }
    
    function login() {
      const pwd = document.getElementById('password').value;
      if(pwd === CORRECT_PASSWORD) {
        localStorage.setItem('admin_logged_in', 'true');
        checkLogin();
        loadProducts();
      } else {
        alert('❌ Wrong password!');
      }
    }
    
    function loadProducts() {
      try {
        const saved = localStorage.getItem('givy_products');
        if(saved && saved !== 'undefined') {
          products = JSON.parse(saved);
        } else {
          products = [];
        }
      } catch(e) { products = []; }
      
      renderProductList();
      updateCount();
    }
    
    function saveProducts() {
      localStorage.setItem('givy_products', JSON.stringify(products));
      renderProductList();
      updateCount();
      alert('✅ Product saved! Check shop.html');
    }
    
    function saveProduct() {
      const name = document.getElementById('name').value.trim();
      const brand = document.getElementById('brand').value.trim();
      const category = document.getElementById('category').value;
      const desc = document.getElementById('desc').value.trim();
      const price = parseFloat(document.getElementById('price').value);
      
      if(!name || !price || isNaN(price)) {
        alert('⚠️ Please fill Name and Price');
        return;
      }
      
      const editId = document.getElementById('editId').value;
      const newProduct = {
        id: editId ? parseInt(editId) : Date.now(),
        name: name,
        brand: brand,
        category: category,
        description: desc,
        price: price,
        images: []
      };
      
      if(editId) {
        const index = products.findIndex(p => p.id == editId);
        if(index !== -1) products[index] = newProduct;
        alert('✏️ Product updated');
        cancelEdit();
      } else {
        products.push(newProduct);
        alert(`✅ "${name}" added!`);
        clearForm();
      }
      
      saveProducts();
    }
    
    function clearForm() {
      document.getElementById('name').value = '';
      document.getElementById('brand').value = 'GIVY STUDIO';
      document.getElementById('desc').value = '';
      document.getElementById('price').value = '';
      document.getElementById('editId').value = '';
      document.getElementById('saveBtn').innerHTML = '💾 Save Product';
      document.getElementById('cancelBtn').style.display = 'none';
      document.getElementById('formTitle').innerHTML = '➕ Add New Product';
    }
    
    function resetAndAddMore() {
      const name = document.getElementById('name').value.trim();
      if(name) {
        saveProduct();
      }
      clearForm();
      alert('✨ Ready to add another product');
    }
    
    function cancelEdit() {
      clearForm();
    }
    
    function editProduct(id) {
      const product = products.find(p => p.id === id);
      if(!product) return;
      
      document.getElementById('name').value = product.name;
      document.getElementById('brand').value = product.brand;
      document.getElementById('category').value = product.category;
      document.getElementById('desc').value = product.description;
      document.getElementById('price').value = product.price;
      document.getElementById('editId').value = product.id;
      document.getElementById('saveBtn').innerHTML = '✏️ Update Product';
      document.getElementById('cancelBtn').style.display = 'block';
      document.getElementById('formTitle').innerHTML = '✏️ Edit Product';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    function deleteProduct(id) {
      if(confirm('Delete this product permanently?')) {
        products = products.filter(p => p.id !== id);
        saveProducts();
        alert('🗑️ Product deleted');
        if(document.getElementById('editId').value == id) cancelEdit();
      }
    }
    
    function renderProductList() {
      const container = document.getElementById('productList');
      if(!products.length) {
        container.innerHTML = '<div style="text-align:center; padding:40px; color:#888;">No products yet. Add your first luxury piece above.</div>';
        return;
      }
      
      container.innerHTML = products.map(p => `
        <div class="product-item">
          <div class="product-info">
            <strong style="color:#C5A267; font-size:18px;">${escapeHtml(p.name)}</strong><br>
            <span style="color:#888;">${p.brand || 'GIVY STUDIO'} | ${p.category}</span><br>
            <span style="color:#C5A267; font-size:20px;">$${p.price.toLocaleString()}</span>
            <p style="font-size:13px; margin-top:5px;">${p.description || ''}</p>
          </div>
          <div>
            <button class="delete-btn" style="background:#2a5f8a;" onclick="editProduct(${p.id})">✏️ Edit</button>
            <button class="delete-btn" onclick="deleteProduct(${p.id})">🗑️ Delete</button>
          </div>
        </div>
      `).join('');
    }
    
    function updateCount() {
      document.getElementById('count').innerText = products.length + ' items';
    }
    
    function syncFacebook() {
      if(products.length === 0) {
        alert('No products to sync');
        return;
      }
      alert(`🚀 ${products.length} products synced to Facebook Marketplace!\n\nProducts will appear in your Facebook catalog.`);
    }
    
    function exitToShop() {
      window.location.href = 'shop.html';
    }
    
    function escapeHtml(str) {
      if(!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if(m === '&') return '&amp;';
        if(m === '<') return '&lt;';
        if(m === '>') return '&gt;';
        return m;
      });
    }
    
    checkLogin();
  </script>
</body>
</html>
