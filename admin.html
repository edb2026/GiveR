<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GivyRewardsShop | Luxury Furniture</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #0A0A0A; font-family: 'Inter', sans-serif; color: #EDEDED; line-height: 1.4; }
    .container { max-width: 1440px; margin: 0 auto; padding: 0 32px; }
    .shop-header { display: flex; justify-content: center; align-items: center; padding: 36px 0 24px 0; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 48px; position: relative; }
    .logo h1 { font-family: 'Playfair Display', serif; font-size: 32px; background: linear-gradient(135deg, #FFFFFF 30%, #C5A267 80%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .logo p { font-size: 12px; letter-spacing: 3px; color: #C5A267; margin-top: 8px; }
    .filters { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 48px; justify-content: center; }
    .filter-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); padding: 8px 28px; font-weight: 500; font-size: 14px; color: #EDEDED; border-radius: 40px; cursor: pointer; transition: all 0.25s ease; }
    .filter-btn.active, .filter-btn:hover { background: #C5A267; border-color: #C5A267; color: #0A0A0A; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px 28px; margin-bottom: 80px; }
    .product-card { background: #121212; border-radius: 28px; overflow: hidden; transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; display: flex; flex-direction: column; }
    .product-card:hover { transform: translateY(-6px); box-shadow: 0 24px 36px -12px rgba(0,0,0,0.8); }
    .product-img { position: relative; overflow: hidden; background: #1E1E1E; aspect-ratio: 4 / 5; }
    .product-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
    .fb-contact-btn { position: absolute; bottom: 18px; left: 18px; background: #1877F2; border: none; border-radius: 40px; padding: 8px 16px; font-size: 12px; font-weight: 600; color: white; display: flex; align-items: center; gap: 8px; cursor: pointer; z-index: 2; transition: 0.2s; }
    .fb-contact-btn:hover { background: #1464CC; }
    .wishlist-icon { position: absolute; top: 18px; right: 18px; background: rgba(10,10,10,0.6); backdrop-filter: blur(4px); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2; }
    .product-info { padding: 20px 20px 24px; flex: 1; display: flex; flex-direction: column; }
    .brand { font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; color: #C5A267; margin-bottom: 8px; }
    .product-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 500; margin-bottom: 10px; }
    .product-description { font-size: 13px; line-height: 1.45; color: #B0B0B0; margin: 8px 0 12px 0; border-left: 2px solid rgba(197,162,103,0.4); padding-left: 12px; }
    .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 14px; }
    .price { font-weight: 600; font-size: 22px; color: #C5A267; }
    .old-price { font-size: 15px; color: #9B9B9B; text-decoration: line-through; margin-left: 12px; }
    .admin-secret-trigger { position: fixed; bottom: 15px; left: 15px; width: 32px; height: 32px; opacity: 0.08; z-index: 999; cursor: pointer; border-radius: 50%; background: #C5A267; display: flex; align-items: center; justify-content: center; }
    .admin-secret-trigger:hover { opacity: 0.3; }
    .toast-msg { position: fixed; bottom: 30px; left: 30px; background: #C5A267; color: #0A0A0A; padding: 12px 24px; border-radius: 40px; font-weight: 600; z-index: 1200; opacity: 0; transform: translateY(20px); transition: 0.25s; pointer-events: none; }
    .toast-msg.show { opacity: 1; transform: translateY(0); }
    footer { text-align: center; padding: 40px 0 32px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 13px; color: #6F6F6F; }
    @media (max-width: 700px) { .container { padding: 0 20px; } }
  </style>
</head>
<body>

<div class="container">
  <header class="shop-header"><div class="logo"><h1>GivyRewardsShop</h1><p>Furniture · Objects · Interior Couture</p></div></header>
  <div class="filters" id="filterGroup">
    <button class="filter-btn active" data-category="all">All Pieces</button>
    <button class="filter-btn" data-category="furniture">Furniture</button>
    <button class="filter-btn" data-category="seating">Seating</button>
    <button class="filter-btn" data-category="beds">Beds</button>
    <button class="filter-btn" data-category="rugs">Rugs</button>
    <button class="filter-btn" data-category="decor">Decor</button>
    <button class="filter-btn" data-category="office">Office</button>
  </div>
  <div class="product-grid" id="productGrid"></div>
</div>

<div class="admin-secret-trigger" id="adminSecretTrigger"><i class="fas fa-crown"></i></div>
<div id="toastMsg" class="toast-msg">✨ Redirecting to Facebook Marketplace...</div>
<footer><p>© GivyRewardsShop — Bespoke Furniture | Connect via Facebook Marketplace</p></footer>

<script>
  // SHOP PAGE - LOADS PRODUCTS FROM SAME localStorage AS ADMIN
  let products = [];
  let activeFilter = "all";
  let categories = ['furniture', 'seating', 'beds', 'rugs', 'decor', 'office'];
  
  function loadProductsFromStorage() {
    const storedProducts = localStorage.getItem('givy_admin_products');
    const storedCategories = localStorage.getItem('givy_admin_categories');
    
    if(storedCategories) {
      categories = JSON.parse(storedCategories);
      updateFilters();
    }
    
    if(storedProducts && JSON.parse(storedProducts).length > 0) {
      products = JSON.parse(storedProducts);
      console.log("✅ Loaded products from admin:", products.length);
    } else {
      // Default demo products
      products = [
        { id: 1, name: "Marquess Sofa", brand: "GIVY STUDIO", price: 4890, oldPrice: 6250, category: "seating", images: ["https://picsum.photos/id/106/400/500"], description: "Sumptuous velvet upholstery with hand-polished brass legs. A masterpiece of contemporary comfort." },
        { id: 2, name: "Eclipse Dining Table", brand: "ATELIER NOIR", price: 6750, oldPrice: 7900, category: "furniture", images: ["https://picsum.photos/id/20/400/500"], description: "Sculptural oval table in smoked oak with matte lacquer finish." },
        { id: 3, name: "Cocoon Armchair", brand: "LUNAIRE", price: 2950, oldPrice: null, category: "seating", images: ["https://picsum.photos/id/24/400/500"], description: "Wrap-around high-back armchair in bouclé wool." }
      ];
    }
    renderProducts();
  }
  
  function updateFilters() {
    const filterContainer = document.getElementById('filterGroup');
    const currentActive = document.querySelector('.filter-btn.active')?.getAttribute('data-category') || 'all';
    filterContainer.innerHTML = '<button class="filter-btn" data-category="all">All Pieces</button>';
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.setAttribute('data-category', cat);
      btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
      filterContainer.appendChild(btn);
    });
    // Re-attach event listeners
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.getAttribute('data-category');
        renderProducts();
      });
      if(btn.getAttribute('data-category') === currentActive) btn.classList.add('active');
    });
  }
  
  function contactSellerOnFacebook(product) {
    const message = encodeURIComponent(`Hi! I'm interested in "${product.name}" ($${product.price.toLocaleString()}) from GivyRewardsShop. Is it still available?`);
    // REPLACE 'your_fb_username' WITH YOUR ACTUAL FACEBOOK MESSENGER LINK
    const sellerFbLink = `https://m.me/your_fb_username`;
    showToast(`📱 Contacting seller about "${product.name}"...`);
    window.dispatchEvent(new CustomEvent('ofer:contactRequest', { detail: { product, sellerLink: sellerFbLink } }));
    alert(`✅ Demo: Customer wants to buy:\n${product.name}\nPrice: $${product.price}\n\nIn production, this would open Facebook Messenger. Replace 'your_fb_username' in shop.html with your actual Facebook username.`);
  }
  
  function renderProducts() {
    const grid = document.getElementById("productGrid");
    const filtered = activeFilter === "all" ? products : products.filter(p => p.category === activeFilter);
    if(filtered.length === 0) { grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px;">No pieces found in this category</div>`; return; }
    grid.innerHTML = filtered.map(product => {
      const firstImage = product.images && product.images[0] ? product.images[0] : "https://picsum.photos/id/26/400/500";
      const brand = product.brand || 'GIVY STUDIO';
      return `
        <div class="product-card" data-id="${product.id}">
          <div class="product-img">
            <img src="${firstImage}" alt="${product.name}" loading="lazy">
            <div class="wishlist-icon" data-wish="${product.id}"><i class="far fa-heart"></i></div>
            <button class="fb-contact-btn" data-id="${product.id}"><i class="fab fa-facebook-messenger"></i> Buy on FB Marketplace</button>
          </div>
          <div class="product-info">
            <div class="brand">${escapeHtml(brand)}</div>
            <div class="product-title">${escapeHtml(product.name)}</div>
            <div class="product-description">${escapeHtml(product.description || 'Luxury craftsmanship, timeless design.')}</div>
            <div class="price-row"><div><span class="price">$${product.price.toLocaleString()}</span>${product.oldPrice ? `<span class="old-price">$${product.oldPrice.toLocaleString()}</span>` : ''}</div></div>
          </div>
        </div>
      `;
    }).join('');
    
    document.querySelectorAll('.fb-contact-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = parseInt(btn.getAttribute('data-id'));
        const product = products.find(p => p.id === id);
        if(product) contactSellerOnFacebook(product);
      });
    });
    document.querySelectorAll('.wishlist-icon').forEach(icon => {
      icon.addEventListener('click', (e) => { e.stopPropagation(); showToast("❤️ Saved to wishlist"); icon.querySelector('i').classList.toggle('fas'); icon.querySelector('i').classList.toggle('far'); });
    });
    document.querySelectorAll('.product-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if(e.target.closest('.fb-contact-btn') || e.target.closest('.wishlist-icon')) return;
        const id = parseInt(card.getAttribute('data-id'));
        const product = products.find(p => p.id === id);
        if(product) showToast(`✨ ${product.name} — Contact seller on Facebook to purchase`);
      });
    });
  }
  
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
  function showToast(msg) { const toast = document.getElementById("toastMsg"); toast.innerText = msg; toast.classList.add("show"); setTimeout(() => toast.classList.remove("show"), 2500); }
  
  // Hidden admin entry: 3 clicks
  let clickCount = 0, clickTimer = null;
  document.getElementById('adminSecretTrigger').addEventListener('click', () => {
    clickCount++;
    if(clickTimer) clearTimeout(clickTimer);
    clickTimer = setTimeout(() => { clickCount = 0; }, 800);
    if(clickCount >= 3) { window.location.href = 'admin.html'; }
  });
  
  // Listen for real-time updates from admin (cross-tab)
  window.addEventListener('storage', (e) => {
    if(e.key === 'givy_admin_products') {
      console.log("🔄 Detected product update from admin");
      loadProductsFromStorage();
      showToast("🔄 Catalog updated by administrator");
    }
    if(e.key === 'givy_admin_categories') {
      console.log("🔄 Detected category update");
      loadProductsFromStorage();
    }
  });
  
  // Initial load
  loadProductsFromStorage();
</script>
</body>
</html>
